<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>真实反馈｜潋 Tarot Studio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --gold: #d4af37;
      --gold-soft: #e6c36a;
      --moon: #f7f1df;
      --mist: #d5d0c5;
      --line: rgba(212, 175, 55, 0.3);
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--moon);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(27, 43, 78, 0.42), transparent 28%),
        radial-gradient(circle at 78% 10%, rgba(46, 38, 72, 0.18), transparent 30%),
        radial-gradient(circle at 52% 96%, rgba(12, 24, 44, 0.36), transparent 38%),
        linear-gradient(145deg, #0a0d12 0%, #080a0d 46%, #050608 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      opacity: 0.52;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.58) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(195, 204, 220, 0.4) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(212, 175, 55, 0.32) 0 1px, transparent 1.4px);
      background-size: 82px 82px, 139px 139px, 211px 211px;
      background-position: 10px 20px, 62px 84px, 132px 36px;
      animation: starPulse 7.5s ease-in-out infinite alternate;
    }

    body::after {
      z-index: 0;
      background:
        linear-gradient(118deg, transparent 14%, rgba(255, 255, 255, 0.035) 14.25%, transparent 15%),
        radial-gradient(circle at center, transparent 0 34%, rgba(5, 6, 8, 0.72) 100%);
    }

    .sky-animation {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star-dust {
      position: absolute;
      inset: -10%;
      opacity: 0.22;
      background-image:
        radial-gradient(circle, rgba(230, 195, 106, 0.28) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(220, 226, 238, 0.18) 0 1px, transparent 1.4px);
      background-size: 180px 180px, 260px 260px;
      background-position: 24px 40px, 140px 86px;
      animation: dustDrift 42s linear infinite;
    }

    .meteor {
      position: absolute;
      top: 12%;
      right: -18%;
      width: 180px;
      height: 1px;
      border-radius: 999px;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(230, 195, 106, 0.18), rgba(255, 255, 255, 0.42));
      box-shadow: 0 0 14px rgba(230, 195, 106, 0.16);
      transform: rotate(-35deg);
      animation: meteorFall 10.5s ease-in-out infinite;
    }

    .meteor:nth-child(2) {
      top: 20%;
      animation-duration: 11.8s;
      animation-delay: 3.8s;
    }

    .meteor:nth-child(3) {
      top: 8%;
      animation-duration: 9.2s;
      animation-delay: 7.4s;
    }

    @keyframes starPulse {
      0% {
        opacity: 0.34;
        filter: brightness(0.82);
      }

      45% {
        opacity: 0.55;
        filter: brightness(1);
      }

      100% {
        opacity: 0.42;
        filter: brightness(0.9);
      }
    }

    @keyframes dustDrift {
      0% {
        transform: translate3d(0, 0, 0);
      }

      100% {
        transform: translate3d(-42px, 28px, 0);
      }
    }

    @keyframes meteorFall {
      0%,
      74% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(-35deg);
      }

      78% {
        opacity: 0.42;
      }

      86% {
        opacity: 0;
        transform: translate3d(-128vw, 82vh, 0) rotate(-35deg);
      }

      100% {
        opacity: 0;
        transform: translate3d(-128vw, 82vh, 0) rotate(-35deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      .star-dust {
        animation: none;
      }

      .meteor {
        display: none;
      }
    }

    .page {
      position: relative;
      z-index: 2;
      width: min(1040px, 92vw);
      margin: 0 auto;
      padding: 38px 0 68px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 8px 0 46px;
      color: rgba(247, 241, 223, 0.84);
      font-size: 0.95rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--gold);
      box-shadow: 0 0 24px rgba(212, 175, 55, 0.14);
    }

    a {
      color: inherit;
    }

    .back-link {
      color: rgba(213, 208, 197, 0.82);
      text-decoration: none;
    }

    .glass-card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        radial-gradient(circle at 88% 10%, rgba(212, 175, 55, 0.1), transparent 20%),
        linear-gradient(180deg, rgba(15, 15, 18, 0.65), rgba(5, 6, 8, 0.68));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 24px 64px rgba(0, 0, 0, 0.46);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: clamp(30px, 5vw, 52px);
      text-align: center;
    }

    .kicker {
      margin: 0 0 10px;
      color: rgba(230, 195, 106, 0.82);
      font-size: 0.86rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--gold-soft);
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 0 42px rgba(212, 175, 55, 0.18);
    }

    .intro {
      max-width: 620px;
      margin: 18px auto 0;
      color: rgba(213, 208, 197, 0.82);
      line-height: 1.8;
    }

    .feedback-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .feedback-card {
      min-height: 140px;
      display: grid;
      place-items: center;
      padding: 24px 18px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 18px;
      color: rgba(255, 248, 223, 0.94);
      text-align: center;
      line-height: 1.65;
      background:
        radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.13), transparent 48%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.052), rgba(15, 15, 18, 0.48));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 26px rgba(212, 175, 55, 0.1),
        0 18px 38px rgba(0, 0, 0, 0.28);
    }

    .button-wrap {
      display: flex;
      justify-content: center;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 26px;
      border: 1px solid rgba(230, 195, 106, 0.72);
      border-radius: 999px;
      color: #08142f;
      background: linear-gradient(135deg, #f6dfa0, #d4af37 52%, #8d6f21);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow:
        0 14px 32px rgba(0, 0, 0, 0.28),
        0 0 30px rgba(212, 175, 55, 0.22);
    }

    @media (max-width: 760px) {
      .feedback-grid {
        grid-template-columns: 1fr;
      }

      .page {
        width: min(100% - 28px, 1040px);
        padding: 24px 0 44px;
      }
    }
  </style>
</head>
<body>
  <div class="sky-animation" aria-hidden="true">
    <div class="star-dust"></div>
    <span class="meteor"></span>
    <span class="meteor"></span>
    <span class="meteor"></span>
  </div>

  <div class="page">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">✦</div>
        <span>潋 Tarot Studio</span>
      </div>
      <a class="back-link" href="index.html">返回首页</a>
    </header>

    <main>
      <section class="hero glass-card">
        <p class="kicker">Real Feedback</p>
        <h1>来访这样评价潋</h1>
        <p class="intro">这里用于承接更多真实反馈。当前先以关键词卡片展示整体口碑，之后可以继续补充精选文字反馈或少量截图。</p>
        <div class="feedback-grid">
          <article class="feedback-card">温柔耐心</article>
          <article class="feedback-card">解读细致</article>
          <article class="feedback-card">不制造焦虑</article>
          <article class="feedback-card">像朋友一样舒服</article>
          <article class="feedback-card">擅长分析情绪状态</article>
          <article class="feedback-card">会给出现实建议</article>
          <article class="feedback-card">后续反馈应验度高</article>
        </div>
        <div class="button-wrap">
          <a class="button" href="index.html#booking">预约咨询</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
